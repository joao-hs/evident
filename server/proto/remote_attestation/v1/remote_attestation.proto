syntax = "proto3";

package remote_attestation.v1;

option go_package = "gitlab.com/dpss-inesc-id/achilles-cvm/client/pb";

message HardwareEvidence {
  bytes raw = 1;
  bytes certificate = 2;
}

message SoftwareEvidence {
  bytes signed_raw = 1;
  bytes signature = 2;
  bytes certificate = 3;
}

message Evidence {
  HardwareEvidence hardware_evidence = 1;
  SoftwareEvidence software_evidence = 2;
}

message GetEvidenceRequest {
  bytes nonce = 1;
}

message GetEvidenceResponse {
  Evidence evidence = 1;
}

service RemoteAttestationService {
  rpc GetEvidence(GetEvidenceRequest) returns (GetEvidenceResponse);
}
